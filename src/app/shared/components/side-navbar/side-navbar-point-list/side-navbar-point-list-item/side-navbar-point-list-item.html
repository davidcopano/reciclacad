<button
  [attr.aria-label]="name() + '. Ver detalle'"
  class="hover:bg-surface-container-low group point-list-item flex w-full items-center justify-between rounded-lg p-3 text-left transition-colors dark:hover:bg-white/5"
  [attr.data-selected]="selected()"
  [attr.aria-selected]="selected()"
  role="option"
>
  <div class="flex items-center gap-3">
    <div aria-hidden="true" class="h-2.5 w-2.5 shrink-0 rounded-full" [ngClass]="typesMap()"></div>
    <div>
      <div class="text-on-surface dark:text-inverse-on-surface text-[13px] font-medium">
        {{ name() }}
      </div>
      <div class="text-outline dark:text-inverse-on-surface/60 text-[11px]">
        A {{ proximityMeters() }}m de ti
      </div>
    </div>
  </div>
  <span
    aria-hidden="true"
    class="material-symbols-outlined text-outline-variant dark:text-inverse-on-surface/40 text-[18px] opacity-70 transition-opacity group-hover:opacity-100"
    >favorite</span
  >
</button>
