<div
  class="dark:bg-inverse-surface/90 dark:text-inverse-on-surface absolute right-3 bottom-21 left-3 z-30 flex flex-col gap-3 rounded-2xl bg-white/90 p-4 backdrop-blur-xl md:right-8 md:bottom-8 md:left-auto md:w-70"
>
  <div class="flex items-start justify-between">
    <h2
      class="font-headline text-on-surface dark:text-inverse-on-surface text-base leading-tight font-bold"
      data-point-detail-address
    >
      {{ name() }}
    </h2>
    <div class="ml-2 flex shrink-0 items-center gap-1">
      <button
        aria-label="Guardar en favoritos"
        class="text-tertiary btn-favorite flex h-8 w-8 items-center justify-center rounded-full transition-transform hover:scale-110"
      >
        <span aria-hidden="true" class="material-symbols-outlined text-[18px]"
          >favorite_border</span
        >
      </button>
      <button
        aria-label="Cerrar tarjeta"
        class="hover:bg-surface-container/50 text-outline dark:text-inverse-on-surface/60 flex h-8 w-8 items-center justify-center rounded-full transition-colors dark:hover:bg-white/10"
      >
        <span aria-hidden="true" class="material-symbols-outlined text-[18px]">close</span>
      </button>
    </div>
  </div>
  <!-- Chips Row -->
  <div class="flex flex-wrap gap-1.5">
    <div
      class="rounded-full px-2.5 py-1 text-[10px] font-bold tracking-wider uppercase"
      [ngClass]="typeClasses()"
      data-point-detail-type
    >
      {{ typeName() }}
    </div>
    <div
      class="bg-surface-container-highest text-on-surface-variant rounded-full px-2.5 py-1 text-[10px] font-bold tracking-wider uppercase"
    >
      {{ schedule() }}
    </div>
  </div>
  <div class="flex items-center gap-1.5">
    <span aria-hidden="true" class="material-symbols-outlined text-outline text-[16px]"
      >near_me</span
    >
    <span
      class="font-ui text-outline dark:text-inverse-on-surface/60 text-[12px]"
      data-point-detail-distance
      >A
      {{ proximityMeters() }}
      metros de ti</span
    >
  </div>
  <button
    data-toast-error="No se pudo abrir la ruta ahora mismo. Vuelve a intentarlo en unos minutos."
    class="bg-primary text-on-primary font-ui mt-1 flex h-9 w-full items-center justify-center gap-2 rounded-xl text-[13px] font-medium transition-all hover:opacity-90 active:scale-[0.98]"
  >
    <span aria-hidden="true" class="material-symbols-outlined text-base">directions</span>
    Cómo llegar
  </button>
</div>
