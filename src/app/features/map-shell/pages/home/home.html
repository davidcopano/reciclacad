<side-navbar-header title="Encuentra tu punto" subtitle="Cádiz Sostenible" />

<!-- Search Bar -->
<div class="relative" data-search-root data-search-context="desktop">
  <span
    class="material-symbols-outlined text-outline-variant dark:text-inverse-on-surface/40 absolute top-1/2 left-3 -translate-y-1/2"
    >search</span
  >
  <input
    aria-label="Buscar por dirección"
    class="bg-surface-container-low dark:text-inverse-on-surface dark:placeholder:text-inverse-on-surface/40 focus:ring-primary/20 w-full rounded-xl border-none py-2 pl-10 text-sm outline-none focus:ring-2 dark:bg-white/10"
    data-search-input
    autocomplete="off"
    placeholder="Buscar por dirección..."
    type="text"
  />
</div>
<!-- Filter Chips (Thematic) -->
<div class="flex flex-wrap gap-2">
  <!-- Vidrio (Primary) -->
  <button
    aria-pressed="true"
    data-filter-chip
    data-filter-type="vidrio"
    class="ghost-border flex items-center gap-1.5 rounded-full border px-4 py-2 text-[12px] font-medium active:scale-[0.98]"
  >
    <span class="material-symbols-outlined text-[16px]">recycling</span>
    Vidrio
  </button>
  <!-- Papel (Secondary) -->
  <button
    aria-pressed="true"
    data-filter-chip
    data-filter-type="papel"
    class="ghost-border flex items-center gap-1.5 rounded-full border px-4 py-2 text-[12px] font-medium active:scale-[0.98]"
  >
    <span class="material-symbols-outlined text-[16px]">description</span>
    Papel
  </button>
  <!-- Envases (Tertiary) -->
  <button
    aria-pressed="true"
    data-filter-chip
    data-filter-type="envases"
    class="ghost-border flex items-center gap-1.5 rounded-full border px-4 py-2 text-[12px] font-medium active:scale-[0.98]"
  >
    <span class="material-symbols-outlined text-[16px]">inventory_2</span>
    Envases
  </button>
  <!-- Pilas (Quaternary - teal) -->
  <button
    aria-pressed="true"
    data-filter-chip
    data-filter-type="pilas"
    class="ghost-border flex items-center gap-1.5 rounded-full border px-4 py-2 text-[12px] font-medium active:scale-[0.98]"
  >
    <span class="material-symbols-outlined text-[16px]">battery_charging_full</span>
    Pilas
  </button>
  <!-- Ropa (Quinary - purple) -->
  <button
    aria-pressed="true"
    data-filter-chip
    data-filter-type="ropa"
    class="ghost-border flex items-center gap-1.5 rounded-full border px-4 py-2 text-[12px] font-medium active:scale-[0.98]"
  >
    <span class="material-symbols-outlined text-[16px]">checkroom</span>
    Ropa
  </button>
</div>
<div class="mt-4 flex-1 overflow-y-auto">
  <div
    class="text-outline dark:text-inverse-on-surface/60 dark:bg-inverse-surface sticky top-0 z-10 mb-4 bg-white px-2 text-[12px] font-medium tracking-wider uppercase"
  >
    342 puntos encontrados
  </div>
  <div class="space-y-1" data-points-list role="listbox" aria-label="Puntos de reciclaje">
    <!-- Point Item 1 -->
    <button
      aria-label="Av. Ana de Viya, 12 — a 250 metros. Ver detalle"
      class="hover:bg-surface-container-low group point-list-item flex w-full items-center justify-between rounded-lg p-3 text-left transition-colors dark:hover:bg-white/5"
      data-point-item
      data-point-id="p1"
      data-selected="true"
      aria-selected="true"
      role="option"
    >
      <div class="flex items-center gap-3">
        <div
          aria-hidden="true"
          class="bg-primary-container h-2.5 w-2.5 shrink-0 rounded-full"
        ></div>
        <div>
          <div class="text-on-surface dark:text-inverse-on-surface text-[13px] font-medium">
            Av. Ana de Viya, 12
          </div>
          <div class="text-outline dark:text-inverse-on-surface/60 text-[11px]">A 250m de ti</div>
        </div>
      </div>
      <span
        aria-hidden="true"
        class="material-symbols-outlined text-outline-variant dark:text-inverse-on-surface/40 text-[18px] opacity-70 transition-opacity group-hover:opacity-100"
        >favorite</span
      >
    </button>
    <!-- Point Item 2 -->
    <button
      aria-label="Plaza de las Flores, 3 — a 400 metros. Ver detalle"
      class="hover:bg-surface-container-low group point-list-item flex w-full items-center justify-between rounded-lg p-3 text-left transition-colors dark:hover:bg-white/5"
      data-point-item
      data-point-id="p2"
      data-selected="false"
      aria-selected="false"
      role="option"
    >
      <div class="flex items-center gap-3">
        <div
          aria-hidden="true"
          class="bg-secondary-container h-2.5 w-2.5 shrink-0 rounded-full"
        ></div>
        <div>
          <div class="text-on-surface dark:text-inverse-on-surface text-[13px] font-medium">
            Plaza de las Flores, 3
          </div>
          <div class="text-outline dark:text-inverse-on-surface/60 text-[11px]">A 400m de ti</div>
        </div>
      </div>
      <span
        aria-hidden="true"
        class="material-symbols-outlined text-outline-variant dark:text-inverse-on-surface/40 text-[18px] opacity-70 transition-opacity group-hover:opacity-100"
        >favorite</span
      >
    </button>
    <!-- Point Item 3 -->
    <button
      aria-label="Calle Columela, 18 — a 600 metros. Ver detalle"
      class="hover:bg-surface-container-low group point-list-item flex w-full items-center justify-between rounded-lg p-3 text-left transition-colors dark:hover:bg-white/5"
      data-point-item
      data-point-id="p3"
      data-selected="false"
      aria-selected="false"
      role="option"
    >
      <div class="flex items-center gap-3">
        <div
          aria-hidden="true"
          class="bg-tertiary-container h-2.5 w-2.5 shrink-0 rounded-full"
        ></div>
        <div>
          <div class="text-on-surface dark:text-inverse-on-surface text-[13px] font-medium">
            Calle Columela, 18
          </div>
          <div class="text-outline dark:text-inverse-on-surface/60 text-[11px]">A 600m de ti</div>
        </div>
      </div>
      <span
        aria-hidden="true"
        class="material-symbols-outlined text-outline-variant dark:text-inverse-on-surface/40 text-[18px] opacity-70 transition-opacity group-hover:opacity-100"
        >favorite</span
      >
    </button>
    <!-- Point Item 4 -->
    <button
      aria-label="Paseo Marítimo, 45 — a 850 metros. Ver detalle"
      class="hover:bg-surface-container-low group point-list-item flex w-full items-center justify-between rounded-lg p-3 text-left transition-colors dark:hover:bg-white/5"
      data-point-item
      data-point-id="p4"
      data-selected="false"
      aria-selected="false"
      role="option"
    >
      <div class="flex items-center gap-3">
        <div
          aria-hidden="true"
          class="bg-primary-container h-2.5 w-2.5 shrink-0 rounded-full"
        ></div>
        <div>
          <div class="text-on-surface dark:text-inverse-on-surface text-[13px] font-medium">
            Paseo Marítimo, 45
          </div>
          <div class="text-outline dark:text-inverse-on-surface/60 text-[11px]">A 850m de ti</div>
        </div>
      </div>
      <span
        aria-hidden="true"
        class="material-symbols-outlined text-outline-variant dark:text-inverse-on-surface/40 text-[18px] opacity-70 transition-opacity group-hover:opacity-100"
        >favorite</span
      >
    </button>
  </div>
</div>
<a
  [routerLink]="['/favorites']"
  class="bg-tertiary dark:bg-tertiary-container text-on-tertiary dark:text-on-tertiary-container mt-auto block w-full rounded-full py-3 text-center font-bold transition-transform hover:opacity-90 active:scale-[0.98]"
>
  Mis favoritos
</a>
